<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قصص القديسين</title>
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<script src="https://kit.fontawesome.com/6b7d4f76b5.js" crossorigin="anonymous"></script>
</head>
<body>

<div id="loading">
<div class="cross">✝</div>
<h1>قصص القديسين</h1>
<p id="loadingText">جارٍ التحميل...</p>
</div>

<div id="app">
<header>
    <button class="menuButton" onclick="openMenu()">☰</button>
<h1 id="pageTitle">✝ القديسون</h1>
<p id="verse">"طوبى لأنقياء القلب لأنهم يعاينون الله."</p>
</header>

<div class="searchBox">
<input type="text" id="search" placeholder="ابحث عن قديس...">
</div>

<p id="noResults" style="display:none;text-align:center;font-size:20px;margin:25px;color:#777;">
🔍 لا توجد نتائج.
</p>

<section class="cards" id="cardsContainer">

</section>
<p id="noFavorites" style="display:none;text-align:center;font-size:22px;margin:40px;color:#777;">
⭐ لا توجد قصص في المفضلة.
</p>

<p id="noStories" style="display:none;text-align:center;font-size:24px;margin:40px;color:#777;">
🎉 مبروك! لقد أنهيت جميع قصص القديسين.<br><br>
❤️ ربنا معاك دايمًا.
</p>

<div class="developer">
    Developed By <b>Martony Moneer</b>
</div>

<div class="continueBox" id="continueBox">

<h3>📖 أكمل القراءة</h3>

<p id="continueText">

لا توجد قصة قيد القراءة.

</p>

<button id="continueBtn" style="display:none;">

متابعة القراءة

</button>

</div>

<div class="progressSection">

    <h3>📚 تقدمك</h3>

    <p id="progressText">0 من 6 قصص</p>

    <div class="homeProgress">

        <div id="homeProgressBar"></div>

    </div>

</div>
</div>

<script src="app.js"></script>

</body>
</html>
